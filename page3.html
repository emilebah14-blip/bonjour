<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bravo 🎉</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

  <span class="bravo-icon">🎉</span>
  <h1>Evidemment !</h1>

  <div class="page3-text" id="bravo-msg">
    Tu as dit OUI !<br>
    ça fait plaisir mon chouu !
  </div>

  <div class="confetti-bar">🎊 🥳 ✨ 🎈</div>

  <button class="restart-btn" onclick="window.location='index.html'">
    🔄 Recommencer
  </button>

</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    function recupererPrenom() {
      try {
        const sp = sessionStorage.getItem("prenom");
        if (sp) return sp;
      } catch(e) {}
      const params = new URLSearchParams(window.location.search);
      return params.get("prenom") || null;
    }
    const prenom = recupererPrenom();
    const msg = document.getElementById("bravo-msg");
    if (prenom && prenom !== "ami") {
      msg.innerHTML = `<strong>${prenom}</strong>, tu as dit OUI ! 🙌<br>ça fait plaisir mon chouu !<br><small style="color:#636e72;font-size:14px">Tu es trop gentille 😄</small>`;
    }
  });
</script>

</body>
<footer> Emile D bah</footer>
</html>
